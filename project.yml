name: PingBar
options:
  bundleIdPrefix: com.lroolle
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "26.5"
  projectFormat: xcode16_3
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    # Xcode 26 provides the Swift 6 compiler. Keep Swift 5 language mode until
    # the Swift 6 concurrency migration is verified in CI.
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  PingBar:
    type: application
    platform: macOS
    sources:
      - path: PingBar
        excludes:
          - "Resources/PingBar.entitlements"
          - "Resources/Brand/PingBarAppIconSource.png"
    info:
      path: PingBar/Resources/Info.plist
      properties:
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSLocationWhenInUseUsageDescription: "PingBar needs location access to read WiFi network names on macOS 14+."
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: PingBar
        LSApplicationCategoryType: public.app-category.utilities
    entitlements:
      path: PingBar/Resources/PingBar.entitlements
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PRODUCT_BUNDLE_IDENTIFIER: com.lroolle.pingbar
        PRODUCT_NAME: PingBar
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        VERSIONING_SYSTEM: apple-generic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        INFOPLIST_FILE: PingBar/Resources/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies: []

  PingBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PingBarTests
      - path: PingBar/Models/AppConfig.swift
      - path: PingBar/Models/EgressRouteResult.swift
      - path: PingBar/Models/PingResult.swift
      - path: PingBar/Models/ProxyStatus.swift
      - path: PingBar/Models/PublicEndpointInfo.swift
      - path: PingBar/Models/PublicIPProviderCatalog.swift
      - path: PingBar/Models/Warning.swift
      - path: PingBar/Models/WiFiInfo.swift
      - path: PingBar/Services/Formatter.swift
      - path: PingBar/Services/WarningEngine.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lroolle.pingbar.tests
        SWIFT_VERSION: "5.0"
        SWIFT_STRICT_CONCURRENCY: complete
        MACOSX_DEPLOYMENT_TARGET: "13.0"

schemes:
  PingBar:
    build:
      targets:
        PingBar: all
        PingBarTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - PingBarTests
